<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Image Overlayer</title>
  <style>
    :root {
      --bg: #0b0c10;
      --panel: rgba(22, 24, 28, 0.72);
      --panel-solid: #16181c;
      --text: #e5e7eb;
      --muted: #9aa3af;
      --accent: #4f46e5;
      --accent-2: #22c55e;
      --danger: #ef4444;
      --stroke: #2a2f37;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Noto Sans, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
    }

    .stage {
      position: relative;
      flex: 1;
      overflow: hidden;
      touch-action: none;
      background: #0e1014;
    }

    .checker {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(45deg, #111 25%, transparent 25%) -10px 0/20px 20px,
        linear-gradient(-45deg, #111 25%, transparent 25%) -10px 0/20px 20px,
        linear-gradient(45deg, transparent 75%, #111 75%) -10px 0/20px 20px,
        linear-gradient(-45deg, transparent 75%, #111 75%) -10px 0/20px 20px,
        #0e1014;
      filter: saturate(0.9) brightness(0.9);
      pointer-events: none;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .topbar {
      position: absolute;
      inset: env(safe-area-inset-top) 0 auto 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      pointer-events: none;
    }

    .chip {
      pointer-events: auto;
      background: var(--panel);
      border-radius: 12px;
      padding: 6px 10px;
      box-shadow: var(--shadow);
      font-size: 12px;
      line-height: 1.4;
    }

    .toolbar {
      position: relative;
      z-index: 11;
      padding: env(safe-area-inset-bottom, 0);
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.35) 40%, rgba(0, 0, 0, 0.6));
    }

    .bar {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(6, 1fr);
      padding: 12px 12px calc(12px + env(safe-area-inset-bottom));
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .btn,
    .file-btn,
    .mini {
      -webkit-tap-highlight-color: transparent;
      appearance: none;
      border: none;
      outline: none;
      border-radius: 14px;
      background: var(--panel);
      color: var(--text);
      box-shadow: var(--shadow);
      font-size: 12px;
      font-weight: 600;
      text-align: center;
    }

    .btn,
    .file-btn {
      padding: 12px 10px;
    }

    .btn:active,
    .file-btn:active,
    .mini:active {
      transform: translateY(1px);
    }

    .btn.success {
      background: linear-gradient(180deg, #34d399, #22c55e);
    }

    .btn.danger,
    .mini.danger {
      background: linear-gradient(180deg, #f87171, #ef4444);
    }

    .btn.locked,
    .mini.locked {
      filter: saturate(0.65);
      background: linear-gradient(180deg, #6b7280, #4b5563);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .file-btn {
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .file-btn input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .slider-wrap {
      grid-column: span 6;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .slider-wrap label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      height: 28px;
      -webkit-appearance: none;
      background: transparent;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 6px;
      background: #2a2f37;
      border-radius: 999px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #a5b4fc;
      margin-top: -8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
    }

    .pill {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(17, 24, 39, 0.6);
      color: var(--muted);
      white-space: nowrap;
    }

    .layer-wrap {
      grid-column: span 6;
      border-radius: 14px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .layer-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      font-size: 12px;
      color: var(--muted);
    }

    .mini {
      padding: 8px 10px;
      border-radius: 10px;
      box-shadow: none;
    }

    .layer-list {
      padding: 10px;
      display: grid;
      gap: 8px;
      max-height: 170px;
      overflow-y: auto;
    }

    .layer-item {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 8px;
      border-radius: 12px;
      border: 1px solid var(--stroke);
      background: rgba(20, 22, 27, 0.8);
      padding: 8px;
      cursor: pointer;
    }

    .layer-item.active {
      border-color: #7c8cff;
      box-shadow: inset 0 0 0 1px rgba(124, 140, 255, 0.35);
    }

    .layer-index {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 11px;
      background: rgba(79, 70, 229, 0.24);
      color: #c9d0ff;
      font-weight: 700;
    }

    .layer-name {
      font-size: 12px;
      color: #dde3ec;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .layer-item .mini {
      font-size: 11px;
      padding: 7px 8px;
      background: rgba(34, 40, 48, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .layer-item .mini.danger {
      border: none;
    }

    .empty {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 14px 8px;
      border-radius: 10px;
      border: 1px dashed rgba(255, 255, 255, 0.14);
    }

    .toast {
      position: absolute;
      left: 50%;
      bottom: 120px;
      transform: translateX(-50%);
      background: rgba(15, 18, 25, 0.9);
      color: #e5e7eb;
      padding: 10px 14px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      font-size: 12px;
      display: none;
      pointer-events: none;
      z-index: 12;
    }

    .toast.show {
      display: inline-block;
    }

    @supports (height: 100dvh) {
      .app {
        height: 100dvh;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="chip" id="status">Load a base image.</div>
      <div class="chip" id="mode-pill">Idle</div>
    </div>

    <div class="stage" id="stage">
      <div class="checker"></div>
      <canvas id="canvas" aria-label="Image overlayer canvas"></canvas>
      <div class="toast" id="toast"></div>
    </div>

    <div class="toolbar">
      <div class="bar">
        <label class="file-btn" title="Load base image">
          Base
          <input id="baseInput" type="file" accept="image/*" />
        </label>
        <label class="file-btn" title="Add overlay image">
          Add Overlay
          <input id="overlayInput" type="file" accept="image/*" multiple />
        </label>
        <button class="btn" id="resetView" title="Reset camera">Reset View</button>
        <button class="btn" id="lockBase" title="Lock base pan/zoom">Base Lock: OFF</button>
        <button class="btn danger" id="removeOverlay" title="Delete selected layer">Delete Selected</button>
        <button class="btn success" id="exportBtn" title="Save PNG">Save PNG</button>

        <div class="slider-wrap">
          <label for="opacity">Selected layer opacity</label>
          <input id="opacity" type="range" min="0" max="1" step="0.01" value="1" />
          <span class="pill" id="opacityVal">100%</span>
        </div>

        <div class="layer-wrap">
          <div class="layer-head">
            <span>Overlay Layers (max 3)</span>
            <button class="mini danger" id="clearOverlays">Delete All</button>
          </div>
          <div class="layer-list" id="layerList">
            <div class="empty">No overlays yet.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./image-overlayer.js" defer></script>
</body>
</html>
