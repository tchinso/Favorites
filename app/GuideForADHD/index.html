<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이젠하워 1:1 분산 차트</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>1:1 비교 아이젠하워 분산 차트</h1>
      <p>
        항목을 입력하면 <strong>응급도</strong>와 <strong>중요도</strong>를 각각 1:1 질문으로 정렬하고,
        4분면 분산 차트로 시각화합니다.
      </p>
      <div class="stats">
        <span id="statusBadge">대기 중</span>
        <span id="questionCount">질문 0회</span>
      </div>
    </header>

    <section class="card">
      <h2>1) 초기 항목 입력</h2>
      <p class="hint">한 줄에 하나씩 입력하세요.</p>
      <textarea id="seedInput" rows="8" placeholder="보고서 작성&#10;홍길동 고객님 문제 해결&#10;자기계발 일본어 학습"></textarea>
      <div class="row">
        <button id="startRankingBtn" class="primary">초기 분류 시작</button>
        <button id="resetBtn" class="ghost">전체 초기화</button>
      </div>
    </section>

    <section class="card">
      <h2>2) 항목 관리</h2>
      <div class="row">
        <input id="newTaskInput" type="text" placeholder="새 항목 입력" />
        <button id="addTaskBtn" class="primary">새 항목 추가 (최소 질문)</button>
      </div>
      <div class="row wrap">
        <label for="adjustTaskSelect">재배치 대상</label>
        <select id="adjustTaskSelect"></select>
        <label><input type="checkbox" id="adjustUrgency" checked /> 응급도</label>
        <label><input type="checkbox" id="adjustImportance" checked /> 중요도</label>
        <button id="rerankBtn">선택 항목 재배치 (최소 질문)</button>
      </div>
      <div class="row">
        <button id="deleteCompletedBtn" class="danger">완료 항목 삭제</button>
      </div>
      <p class="hint">
        수동 조정은 아래 표의 슬라이더로 가능하며, 새 항목/재배치는 기존 순서를 활용해 질문 수를 최소화합니다.
      </p>
    </section>

    <section class="card question-card" id="questionCard" hidden>
      <h2>비교 질문</h2>
      <p id="questionPrompt"></p>
      <div class="question-actions">
        <button id="chooseLeftBtn" class="primary"></button>
        <button id="chooseRightBtn" class="primary"></button>
        <button id="chooseTieBtn" class="ghost">비슷함</button>
      </div>
    </section>

    <section class="card">
      <h2>3) 4분면 분산 차트</h2>
      <div class="chart-wrap">
        <canvas id="matrixCanvas" width="900" height="520" aria-label="아이젠하워 분산 차트"></canvas>
      </div>
      <p class="hint">X축: 중요도, Y축: 응급도 (위로 갈수록 응급)</p>
    </section>

    <section class="card">
      <h2>4) 항목 목록 / 수동 조정</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>완료</th>
              <th>항목</th>
              <th>중요도</th>
              <th>응급도</th>
              <th>작업</th>
            </tr>
          </thead>
          <tbody id="taskTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="card">
      <h2>5) JSON 내보내기 / 불러오기</h2>
      <div class="row wrap">
        <button id="exportBtn">JSON 생성</button>
        <button id="downloadBtn">JSON 파일 다운로드</button>
        <input id="importFileInput" type="file" accept="application/json" />
        <button id="importFileBtn">파일 불러오기</button>
      </div>
      <textarea id="jsonArea" rows="10" placeholder="여기에 JSON이 표시됩니다."></textarea>
      <div class="row">
        <button id="importTextBtn">텍스트 JSON 불러오기</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
