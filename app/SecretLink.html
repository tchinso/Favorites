<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Link & Text Encrypter | Static AES-GCM (Web Crypto)</title>
  <style>
    :root {
      --bg: #0b1220;
      --fg: #e8eefc;
      --dim: #9bb0d6;
      --acc: #7fa2ff;
      --bad: #ff6b6b;
      --ok: #32d296;
      --box: #121a2e;
      --mut: #1a2440;
    }
    html, body {
      height: 100%;
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans", sans-serif;
      color: var(--fg);
      background: radial-gradient(1200px 600px at 15% -10%, #1a2b55 0%, transparent 40%), var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(900px, 100%);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
      border: 1px solid #1f2a48;
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      padding: 22px 22px 12px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      letter-spacing: 0.3px;
    }
    p {
      margin: 6px 0 12px;
      color: var(--dim);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 10px 0;
    }
    label {
      font-size: 13px;
      color: var(--dim);
    }
    input[type="text"], input[type="password"], input[type="number"], textarea {
      width: 100%;
      padding: 11px 12px;
      border-radius: 10px;
      border: 1px solid #233056;
      background: var(--box);
      color: var(--fg);
      outline: none;
      box-sizing: border-box;
    }
    textarea {
      min-height: 108px;
      resize: vertical;
    }
    .btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #233056;
      background: linear-gradient(180deg, #223463, #1a2a53);
      color: var(--fg);
      cursor: pointer;
      transition: transform 0.05s ease, box-shadow 0.2s ease;
    }
    button:hover {
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
      transform: translateY(-1px);
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .muted {
      color: var(--dim);
      font-size: 12px;
    }
    .warn {
      color: var(--bad);
      font-weight: 600;
    }
    .good {
      color: var(--ok);
      font-weight: 600;
    }
    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .hr {
      height: 1px;
      background: #1f2a48;
      margin: 14px 0;
    }
    details {
      background: var(--mut);
      border: 1px solid #24325b;
      border-radius: 12px;
      padding: 10px 12px;
    }
    summary {
      cursor: pointer;
    }
    .outbox {
      background: #10172b;
      border: 1px dashed #2a3b6c;
      border-radius: 12px;
      padding: 10px;
      word-break: break-all;
    }
    .result-box {
      background: #10172b;
      border: 1px dashed #2a3b6c;
      border-radius: 12px;
      padding: 12px;
      word-break: normal;
      overflow-wrap: anywhere;
    }
    .secret-text {
      margin: 8px 0 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0d1428;
      border: 1px solid #223463;
      border-radius: 8px;
      padding: 10px;
    }
    .hidden {
      display: none;
    }
    a {
      color: #8fb2ff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Link & Text Encrypter | Static AES-GCM</h1>
    <p class="muted">브라우저(Web Crypto)에서 링크/텍스트를 암호화합니다. 비밀번호 없이는 복호화할 수 없습니다.</p>

    <div id="encUI">
      <div class="row">
        <label for="inLinks">암호화할 링크 목록 (줄바꿈으로 여러 개 입력, 선택)</label>
        <textarea id="inLinks" placeholder="https://example.com/one&#10;https://example.com/two"></textarea>
      </div>

      <div class="row">
        <label for="inSecretText">함께 암호화할 텍스트 (선택, 복호화 시에만 공개)</label>
        <textarea id="inSecretText" placeholder="비밀번호를 알아야 볼 수 있는 메모"></textarea>
      </div>

      <div class="row">
        <label for="inPublicHint">공개 힌트 텍스트 (선택, URL에 평문으로 포함)</label>
        <input id="inPublicHint" type="text" placeholder="예: 팀 공용 문서용 링크" />
      </div>

      <div class="row">
        <label for="inPass">비밀번호 (최소 8자 권장: 다이스웨어/문장형)</label>
        <input id="inPass" type="password" placeholder="correct horse battery staple ..." autocomplete="new-password" />
      </div>

      <details>
        <summary>고급 설정 (PBKDF2 반복 횟수)</summary>
        <div class="row">
          <label for="inIter">PBKDF2 반복 횟수 (기본값 500,000)</label>
          <input id="inIter" type="number" min="100000" step="10000" value="500000" />
        </div>
      </details>

      <div class="btns">
        <button id="btnEncrypt">Encrypt & Build Link</button>
        <button id="btnClear">Clear</button>
      </div>

      <div id="encResult" class="hidden">
        <div class="hr"></div>
        <p class="muted">아래 URL을 공유하세요. 상대는 비밀번호로 복호화해야 내용을 볼 수 있습니다.</p>
        <div id="outURL" class="outbox mono"></div>
        <div class="btns" style="margin-top: 8px">
          <button id="btnCopy">Copy</button>
          <button id="btnOpen">Open in new tab</button>
        </div>
        <div id="copyStatus" class="muted" style="margin-top: 6px"></div>
      </div>

      <div class="hr"></div>
      <p class="muted">알고리즘: PBKDF2-SHA512 -> HKDF-SHA512 -> AES-256-GCM (AAD 무결성 검증 포함)</p>
    </div>

    <div id="decUI" class="hidden">
      <div id="publicHintWrap" class="row hidden">
        <label>공개 힌트</label>
        <div id="publicHint" class="outbox"></div>
      </div>

      <div class="row">
        <label for="decPass">복호화 비밀번호</label>
        <input id="decPass" type="password" placeholder="passphrase" autocomplete="current-password" />
      </div>

      <div class="btns">
        <button id="btnDecrypt">복호화 & 이동</button>
        <button id="btnShow">복호화만</button>
        <button id="btnCancel">취소</button>
      </div>

      <div id="decStatus" class="muted" style="margin-top: 8px"></div>
      <div id="decPreview" class="result-box hidden" style="margin-top: 8px"></div>
    </div>
  </div>

  <script>
    const te = new TextEncoder();
    const td = new TextDecoder();

    const PAYLOAD_PARAM = "link";
    const HINT_PARAM = "hint";
    const ALG_NAME = "PBKDF2-SHA512+HKDF-SHA512+AES-256-GCM";
    const INFO_V1 = "enc-link-v1";
    const INFO_V2 = "enc-link-v2";

    function toBase64Url(ab) {
      const bytes = new Uint8Array(ab);
      const chunkSize = 0x8000;
      let binary = "";
      for (let i = 0; i < bytes.length; i += chunkSize) {
        binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
      }
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    }

    function fromBase64Url(b64url) {
      let b64 = b64url.replace(/-/g, "+").replace(/_/g, "/");
      const pad = b64.length % 4;
      if (pad) {
        b64 += "=".repeat(4 - pad);
      }
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i += 1) {
        out[i] = bin.charCodeAt(i);
      }
      return out.buffer;
    }

    function randBytes(n) {
      const a = new Uint8Array(n);
      crypto.getRandomValues(a);
      return a;
    }

    function escapeHtml(s) {
      return s
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function isHttpUrl(v) {
      return /^https?:\/\/\S+$/i.test(v);
    }

    function parseLinksInput(v) {
      return v
        .split(/\r?\n/)
        .map((line) => line.trim())
        .filter(Boolean);
    }

    function buildHeader(obj) {
      const hdr = {
        v: obj.v,
        alg: obj.alg,
        iter: obj.iter,
        salt: obj.salt,
        iv: obj.iv
      };
      if (Object.prototype.hasOwnProperty.call(obj, "typ")) {
        hdr.typ = obj.typ;
      }
      return JSON.stringify(hdr);
    }

    function packPayload(obj) {
      return toBase64Url(te.encode(JSON.stringify(obj)).buffer);
    }

    function unpackPayload(b64url) {
      try {
        const decoded = td.decode(fromBase64Url(b64url));
        return JSON.parse(decoded);
      } catch {
        return null;
      }
    }

    async function pbkdf2Bits(passBytes, salt, iterations, lengthBits = 256) {
      const key = await crypto.subtle.importKey("raw", passBytes, { name: "PBKDF2" }, false, ["deriveBits"]);
      return crypto.subtle.deriveBits(
        { name: "PBKDF2", hash: "SHA-512", salt, iterations },
        key,
        lengthBits
      );
    }

    async function hkdfAesKey(ikmRaw, infoStr) {
      const ikm = await crypto.subtle.importKey("raw", ikmRaw, { name: "HKDF" }, false, ["deriveKey"]);
      return crypto.subtle.deriveKey(
        {
          name: "HKDF",
          hash: "SHA-512",
          salt: new Uint8Array([]),
          info: te.encode(infoStr)
        },
        ikm,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
      );
    }

    async function encryptBundle({ links, text }, passphrase, iterations) {
      if (!passphrase || passphrase.length < 8) {
        throw new Error("비밀번호는 최소 8자 이상이어야 합니다.");
      }
      if (!Number.isInteger(iterations) || iterations < 100000) {
        throw new Error("PBKDF2 반복 횟수는 100,000 이상 정수여야 합니다.");
      }
      if (!links.length && !text) {
        throw new Error("최소 1개의 링크 또는 텍스트를 입력해 주세요.");
      }
      const invalidLink = links.find((link) => !isHttpUrl(link));
      if (invalidLink) {
        throw new Error(`유효하지 않은 링크 형식: ${invalidLink}`);
      }

      const salt = randBytes(16);
      const iv = randBytes(12);
      const ikm = await pbkdf2Bits(te.encode(passphrase), salt, iterations, 256);
      const key = await hkdfAesKey(ikm, INFO_V2);

      const payload = {
        v: 2,
        typ: "bundle",
        alg: ALG_NAME,
        iter: iterations,
        salt: toBase64Url(salt.buffer),
        iv: toBase64Url(iv.buffer),
        ct: null
      };

      const aad = te.encode(buildHeader(payload));
      const plainObj = { links, text };
      const plainBytes = te.encode(JSON.stringify(plainObj));
      const cipher = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv, additionalData: aad, tagLength: 128 },
        key,
        plainBytes
      );
      payload.ct = toBase64Url(cipher);

      return packPayload(payload);
    }

    async function decryptPayload(payloadB64, passphrase) {
      if (!passphrase) {
        throw new Error("비밀번호를 입력해 주세요.");
      }
      const obj = unpackPayload(payloadB64);
      if (!obj) {
        throw new Error("잘못된 payload 형식입니다.");
      }
      if (!obj.v || !obj.alg || (obj.iter === undefined || obj.iter === null) || !obj.salt || !obj.iv || !obj.ct) {
        throw new Error("payload 필드가 올바르지 않습니다.");
      }
      if (obj.v !== 1 && obj.v !== 2) {
        throw new Error("지원하지 않는 payload 버전입니다.");
      }
      const iterations = Number(obj.iter);
      if (!Number.isInteger(iterations) || iterations <= 0) {
        throw new Error("payload 반복 횟수가 올바르지 않습니다.");
      }

      const salt = fromBase64Url(obj.salt);
      const iv = fromBase64Url(obj.iv);
      const ct = fromBase64Url(obj.ct);
      const ikm = await pbkdf2Bits(te.encode(passphrase), salt, iterations, 256);
      const key = await hkdfAesKey(ikm, obj.v === 1 ? INFO_V1 : INFO_V2);
      const aad = te.encode(buildHeader(obj));

      let plainBuf;
      try {
        plainBuf = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv, additionalData: aad, tagLength: 128 },
          key,
          ct
        );
      } catch {
        throw new Error("복호화 실패: 비밀번호가 틀렸거나 데이터가 손상되었습니다.");
      }

      if (obj.v === 1) {
        return { links: [td.decode(plainBuf)], text: "" };
      }

      let parsed;
      try {
        parsed = JSON.parse(td.decode(plainBuf));
      } catch {
        throw new Error("복호화 결과를 해석할 수 없습니다.");
      }

      const links = Array.isArray(parsed.links)
        ? parsed.links.filter((x) => typeof x === "string" && x.trim())
        : [];
      const text = typeof parsed.text === "string" ? parsed.text : "";

      if (!links.length && !text) {
        throw new Error("복호화 결과가 비어 있습니다.");
      }
      return { links, text };
    }

    const $ = (q) => document.querySelector(q);
    const encUI = $("#encUI");
    const decUI = $("#decUI");

    function currentBaseURL() {
      const u = new URL(window.location.href);
      return `${u.origin}${u.pathname}`;
    }

    function makeShareURL(payload, hint) {
      const params = new URLSearchParams();
      params.set(PAYLOAD_PARAM, payload);
      if (hint) {
        params.set(HINT_PARAM, hint);
      }
      return `${currentBaseURL()}?${params.toString()}`;
    }

    function renderDecrypted(bundle) {
      const preview = $("#decPreview");
      let html = "";

      if (bundle.links.length) {
        html += `<div><strong>복호화된 링크 (${bundle.links.length})</strong></div>`;
        html += bundle.links
          .map((link, idx) => {
            const safe = escapeHtml(link);
            if (isHttpUrl(link)) {
              return `<div style="margin-top:6px"><a href="${safe}" target="_blank" rel="noopener">${idx + 1}. ${safe}</a></div>`;
            }
            return `<div style="margin-top:6px">${idx + 1}. ${safe}</div>`;
          })
          .join("");
      } else {
        html += `<div class="muted">복호화된 링크가 없습니다.</div>`;
      }

      html += `<div class="hr" style="margin:12px 0"></div>`;
      if (bundle.text) {
        html += `<div><strong>복호화된 텍스트</strong></div>`;
        html += `<pre class="secret-text">${escapeHtml(bundle.text)}</pre>`;
      } else {
        html += `<div class="muted">복호화된 텍스트가 없습니다.</div>`;
      }

      preview.innerHTML = html;
      preview.classList.remove("hidden");
    }

    async function onEncrypt() {
      const links = parseLinksInput($("#inLinks").value);
      const rawText = $("#inSecretText").value;
      const text = rawText.trim() ? rawText : "";
      const hint = $("#inPublicHint").value.trim();
      const pass = $("#inPass").value;
      const iterations = parseInt($("#inIter").value || "500000", 10);
      const btn = $("#btnEncrypt");

      btn.disabled = true;
      btn.textContent = "Encrypting...";
      $("#copyStatus").textContent = "";

      try {
        const payload = await encryptBundle({ links, text }, pass, iterations);
        const out = makeShareURL(payload, hint);
        $("#outURL").textContent = out;
        $("#encResult").classList.remove("hidden");
      } catch (e) {
        alert(e.message || String(e));
      } finally {
        btn.disabled = false;
        btn.textContent = "Encrypt & Build Link";
      }
    }

    async function onDecrypt({ redirect }) {
      const pass = $("#decPass").value;
      const status = $("#decStatus");
      const preview = $("#decPreview");
      const u = new URL(window.location.href);
      const payload = u.searchParams.get(PAYLOAD_PARAM);

      preview.classList.add("hidden");
      preview.innerHTML = "";
      status.textContent = "복호화 중...";

      if (!payload) {
        status.textContent = "암호화 payload가 없습니다.";
        return;
      }

      try {
        const bundle = await decryptPayload(payload, pass);

        if (
          redirect &&
          bundle.links.length === 1 &&
          !bundle.text.trim() &&
          isHttpUrl(bundle.links[0])
        ) {
          window.location.replace(bundle.links[0]);
          return;
        }

        if (redirect && bundle.links.length >= 1 && isHttpUrl(bundle.links[0])) {
          window.open(bundle.links[0], "_blank", "noopener");
          status.textContent = "복호화 완료. 첫 번째 링크를 새 탭에서 열었습니다.";
        } else {
          status.textContent = "복호화 완료.";
        }

        renderDecrypted(bundle);
      } catch (e) {
        status.innerHTML = `<span class="warn">${escapeHtml(e.message || "복호화 실패")}</span>`;
      }
    }

    function onCopy() {
      const text = $("#outURL").textContent.trim();
      if (!text) {
        return;
      }
      navigator.clipboard.writeText(text)
        .then(() => {
          $("#copyStatus").innerHTML = `<span class="good">Copied</span>`;
          setTimeout(() => {
            $("#copyStatus").textContent = "";
          }, 1200);
        })
        .catch(() => {
          $("#copyStatus").innerHTML = `<span class="warn">복사에 실패했습니다. 수동으로 복사해 주세요.</span>`;
        });
    }

    function showPublicHint(hint) {
      const wrap = $("#publicHintWrap");
      const box = $("#publicHint");
      if (hint) {
        box.textContent = hint;
        wrap.classList.remove("hidden");
      } else {
        box.textContent = "";
        wrap.classList.add("hidden");
      }
    }

    function initMode() {
      const u = new URL(window.location.href);
      const payload = u.searchParams.get(PAYLOAD_PARAM);
      const hint = u.searchParams.get(HINT_PARAM);

      if (payload) {
        encUI.classList.add("hidden");
        decUI.classList.remove("hidden");
        showPublicHint(hint);
        $("#decPass").focus();
      } else {
        encUI.classList.remove("hidden");
        decUI.classList.add("hidden");
        $("#inLinks").focus();
      }
    }

    function bindUI() {
      $("#btnEncrypt").addEventListener("click", onEncrypt);
      $("#btnClear").addEventListener("click", () => {
        $("#inLinks").value = "";
        $("#inSecretText").value = "";
        $("#inPublicHint").value = "";
        $("#inPass").value = "";
        $("#inIter").value = "500000";
        $("#encResult").classList.add("hidden");
        $("#outURL").textContent = "";
        $("#copyStatus").textContent = "";
      });
      $("#btnCopy").addEventListener("click", onCopy);
      $("#btnOpen").addEventListener("click", () => {
        const url = $("#outURL").textContent.trim();
        if (url) {
          window.open(url, "_blank", "noopener");
        }
      });
      $("#btnDecrypt").addEventListener("click", () => onDecrypt({ redirect: true }));
      $("#btnShow").addEventListener("click", () => onDecrypt({ redirect: false }));
      $("#btnCancel").addEventListener("click", () => {
        window.location.href = currentBaseURL();
      });
    }

    window.addEventListener("DOMContentLoaded", () => {
      if (!("crypto" in window) || !crypto.subtle) {
        alert("Web Crypto API가 필요합니다. (https 또는 localhost 환경)");
      }
      initMode();
      bindUI();
    });
  </script>
</body>
</html>
